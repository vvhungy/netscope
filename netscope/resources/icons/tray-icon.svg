<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Simple tray icon - network activity indicator -->
  <rect x="4" y="4" width="56" height="56" rx="8" fill="#1a1a2e"/>

  <!-- Download bar (green) -->
  <rect x="10" y="38" width="18" height="16" rx="2" fill="#4ade80"/>

  <!-- Upload bar (blue) -->
  <rect x="36" y="22" width="18" height="32" rx="2" fill="#60a5fa"/>

  <!-- Network symbol -->
  <circle cx="32" cy="14" r="4" fill="#4a9eff"/>
  <line x1="32" y1="18" x2="32" y2="22" stroke="#4a9eff" stroke-width="2"/>
</svg>
